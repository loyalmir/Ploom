<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>주문표</title>

<!-- ===== Firebase (선택사항) ===== -->
<!-- 실서버로 쓰려면 아래 firebaseConfig에 네 키를 채워. 비워두면 임시저장 모드로 돌아감. -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  :root{
    --bg:#efe7da; --card:#fffdf9; --ink:#3d2f20; --ink2:#7a6852;
    --line:#e5d8c4; --header:#ead9bf; --accent:#c1763c; --accent2:#b46a32;
    --soft:#f6efe2; --danger:#d9817a; --ok:#7da06a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:40px;}
  .wrap{max-width:520px; margin:0 auto; padding:14px;}

  /* 탭 */
  .tabs{display:flex; gap:8px; background:var(--card); border:1px solid var(--line);
    border-radius:18px; padding:8px; margin-bottom:18px;}
  .tab{flex:1; text-align:center; padding:12px 4px; border-radius:13px; font-weight:700;
    font-size:15px; color:var(--ink2); cursor:pointer; transition:.15s; border:none; background:none;}
  .tab.active{background:var(--accent); color:#fff; box-shadow:0 4px 10px rgba(193,118,60,.3);}

  h1.title{text-align:center; font-size:26px; margin:6px 0 4px;}
  .sub{text-align:center; color:var(--ink2); font-size:14px; line-height:1.6; margin:0 0 18px; padding:0 10px;}

  /* 카드 */
  .card{background:var(--card); border:1px solid var(--line); border-radius:20px;
    overflow:hidden; margin-bottom:18px;}
  .card-head{background:var(--header); padding:15px 18px; display:flex; align-items:center;
    justify-content:space-between; font-weight:800; font-size:17px;}
  .pill{background:var(--card); border-radius:14px; padding:5px 14px; font-size:14px; font-weight:700;}
  .card-body{padding:16px;}

  /* 항목 편집 (주최자) */
  .item-box{border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; background:#fffefb;}
  .item-row{display:flex; gap:10px; align-items:center;}
  .item-name{flex:1; border:1px solid var(--line); border-radius:12px; padding:13px 15px;
    font-size:17px; font-weight:700; color:var(--ink); background:#fff;}
  .x-btn{width:40px; height:40px; border-radius:50%; border:1px solid var(--line);
    background:#fff; color:var(--danger); font-size:18px; cursor:pointer; flex:0 0 auto;}

  .type-row{display:flex; gap:8px; margin-top:12px;}
  .type-btn{flex:1; padding:9px; border-radius:11px; border:1px solid var(--line);
    background:var(--soft); color:var(--ink2); font-weight:700; font-size:13.5px; cursor:pointer;}
  .type-btn.on{background:var(--accent); color:#fff; border-color:var(--accent);}

  .opts{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center;}
  .opt-chip{background:var(--soft); border:1px solid var(--line); border-radius:13px;
    padding:8px 12px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px;}
  .opt-chip .del{color:var(--danger); cursor:pointer; font-weight:800;}
  .add-opt{border:1.5px dashed var(--line); border-radius:13px; padding:8px 14px;
    color:var(--ink2); font-size:14px; cursor:pointer; background:none; font-weight:600;}
  .hint{font-size:12.5px; color:var(--ink2); margin-top:10px; line-height:1.5;}

  .new-item{display:flex; gap:10px; margin-top:6px;}
  .new-item input{flex:1; border:1.5px dashed var(--line); border-radius:13px; padding:14px;
    font-size:15px; background:var(--soft);}
  .btn-acc{background:var(--accent); color:#fff; border:none; border-radius:13px;
    padding:0 18px; font-weight:800; font-size:15px; cursor:pointer; white-space:nowrap;}

  /* 주문 현황 / 식수 체크 표 */
  table{width:100%; border-collapse:collapse;}
  th,td{padding:13px 8px; text-align:left; font-size:14.5px; border-bottom:1px solid var(--line);}
  th{color:var(--ink2); font-weight:700; font-size:13px;}
  td.idx{color:var(--accent2); font-weight:700; width:26px;}
  td.nm{font-weight:800;}
  .cell-val{color:var(--ink); font-weight:600;}
  .cell-empty{color:#cdbfa9;}

  /* 식수 체크: 개인 입력 */
  .person-pick{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
  .who{padding:9px 14px; border-radius:13px; border:1px solid var(--line); background:#fff;
    font-weight:700; font-size:14px; cursor:pointer; color:var(--ink2);}
  .who.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .field{margin:16px 0;}
  .field-label{font-weight:800; font-size:15px; margin-bottom:9px; display:flex; align-items:center; gap:6px;}
  .tag{font-size:11px; font-weight:700; padding:3px 8px; border-radius:8px;}
  .tag.sel{background:#e8eddf; color:var(--ok);}
  .tag.inp{background:#f0e2d4; color:var(--accent2);}
  .choice-row{display:flex; flex-wrap:wrap; gap:8px;}
  .choice{padding:11px 16px; border-radius:13px; border:1px solid var(--line); background:#fff;
    font-weight:700; font-size:15px; cursor:pointer; color:var(--ink);}
  .choice.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .choice.clear{color:var(--ink2); font-weight:600;}
  .text-in{width:100%; border:1px solid var(--line); border-radius:13px; padding:14px;
    font-size:16px; background:#fff;}
  .save-row{margin-top:18px;}
  .save-btn{width:100%; background:var(--accent); color:#fff; border:none; border-radius:15px;
    padding:16px; font-weight:800; font-size:16px; cursor:pointer;}

  .mode-badge{text-align:center; font-size:12px; color:var(--ink2); margin-top:8px;}
  .add-person{display:flex; gap:10px; margin-top:14px;}
  .add-person input{flex:1; border:1.5px dashed var(--line); border-radius:13px; padding:13px; font-size:15px; background:var(--soft);}
  .empty{text-align:center; color:var(--ink2); padding:24px 0; font-size:14px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="tabs">
    <button class="tab" data-tab="check">🍚 식수 체크</button>
    <button class="tab active" data-tab="order">📝 주문표</button>
    <button class="tab" data-tab="host">📌 주최자</button>
  </div>

  <h1 class="title" id="monthTitle">6월 주문표</h1>

  <!-- ================= 주문표 (주최자 편집) ================= -->
  <div id="panel-order">
    <p class="sub">받을 항목(음식·음료·차량번호 등)을 자유롭게 만드세요.<br>
      <b>선택형</b>은 선택지를 미리 등록하고, <b>입력형</b>은 각자 직접 적어요.</p>

    <div class="card">
      <div class="card-head"><span>🧩 받을 항목</span><span class="pill" id="orderMonth">6월</span></div>
      <div class="card-body">
        <div id="itemList"></div>
        <div class="new-item">
          <input id="newItemInput" placeholder="새 항목 (예: 음료, 차량번호…)">
          <button class="btn-acc" id="addItemBtn">＋ 항목</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span>📋 주문 현황</span><span class="pill" id="orderCount">0명</span></div>
      <div class="card-body" style="padding:0;">
        <div id="statusTable"></div>
      </div>
    </div>
  </div>

  <!-- ================= 식수 체크 (개인 입력) ================= -->
  <div id="panel-check" style="display:none;">
    <p class="sub">본인을 고르고, 항목별로 선택하거나 직접 입력하세요.</p>
    <div class="card">
      <div class="card-head"><span>🙋 누구신가요?</span></div>
      <div class="card-body">
        <div class="person-pick" id="personPick"></div>
        <div class="add-person">
          <input id="newPersonInput" placeholder="이름 추가 (예: 김건하B)">
          <button class="btn-acc" id="addPersonBtn">＋ 추가</button>
        </div>
      </div>
    </div>
    <div class="card" id="formCard" style="display:none;">
      <div class="card-head"><span id="formWho">작성</span></div>
      <div class="card-body">
        <div id="formFields"></div>
        <div class="save-row"><button class="save-btn" id="saveBtn">저장하기</button></div>
      </div>
    </div>
  </div>

  <!-- ================= 주최자 ================= -->
  <div id="panel-host" style="display:none;">
    <p class="sub">월 설정과 데이터 관리.</p>
    <div class="card">
      <div class="card-head"><span>🗓️ 이번 달</span></div>
      <div class="card-body">
        <div class="new-item">
          <input id="monthInput" placeholder="예: 6월" value="6월">
          <button class="btn-acc" id="setMonthBtn">변경</button>
        </div>
        <div class="hint">월을 바꾸면 제목과 라벨이 함께 바뀝니다.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span>🧹 전체 비우기</span></div>
      <div class="card-body">
        <button class="x-btn" style="width:auto; padding:10px 16px; border-radius:13px; color:var(--danger); font-weight:700;" id="resetBtn">모든 응답 초기화</button>
        <div class="hint">항목은 유지하고, 사람들이 적은 응답만 비웁니다.</div>
      </div>
    </div>
  </div>

  <div class="mode-badge" id="modeBadge"></div>
</div>

<script>
/* =========================================================
   1) Firebase 설정 — 네 키를 여기 채우면 실서버 동작.
      비워두면 자동으로 임시(메모리) 모드로 돌아감.
   ========================================================= */
const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  databaseURL: "",            // 예: https://k-hary-default-rtdb.firebaseio.com
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};

/* =========================================================
   2) 데이터 레이어 (Firebase ↔ 메모리 자동 전환)
   ========================================================= */
let useFB = false, fbRef = null;
let state = { month:"6월", items:{}, people:{} };

try {
  if (firebaseConfig.databaseURL && firebaseConfig.apiKey) {
    firebase.initializeApp(firebaseConfig);
    fbRef = firebase.database().ref("teamday");
    useFB = true;
  }
} catch(e){ useFB = false; }

function seed(){
  // 처음 한 번만: 화면 예시대로 시작 데이터
  state.month = "6월";
  state.items = {
    i1:{ name:"식사", type:"select", options:["A세트","B세트"], order:0 },
    i2:{ name:"음료", type:"select", options:["아아","뜨아"], order:1 },
    i3:{ name:"차량번호", type:"input", options:[], order:2 }
  };
  state.people = {
    p1:{name:"김동언B", res:{}}, p2:{name:"김건하B", res:{}},
    p3:{name:"정찬원B", res:{}}, p4:{name:"박정민B", res:{}},
    p5:{name:"신민기B", res:{}}, p6:{name:"박그린S", res:{}}
  };
}

function load(cb){
  if (useFB){
    fbRef.on("value", snap=>{
      const v = snap.val();
      if (v){ state = v; if(!state.items) state.items={}; if(!state.people) state.people={}; }
      else { seed(); save(); }
      cb();
    });
  } else {
    seed(); cb();
  }
}
function save(){
  if (useFB && fbRef) fbRef.set(state);
  // 메모리 모드면 그대로 유지
}

/* =========================================================
   3) 화면 그리기
   ========================================================= */
let currentPerson = null;

function uid(p){ return p + Math.random().toString(36).slice(2,7); }
function sortedItems(){ return Object.entries(state.items).sort((a,b)=>(a[1].order||0)-(b[1].order||0)); }
function sortedPeople(){ return Object.entries(state.people); }

function render(){
  document.getElementById("monthTitle").textContent = state.month + " 주문표";
  document.getElementById("orderMonth").textContent = state.month;
  renderItems();
  renderStatus();
  renderPersonPick();
  if (currentPerson) renderForm();
  document.getElementById("modeBadge").textContent =
    useFB ? "🟢 실서버 연결됨" : "🟡 임시저장 모드 (Firebase 키 입력 시 실서버)";
}

/* --- 주문표: 항목 편집 --- */
function renderItems(){
  const box = document.getElementById("itemList");
  box.innerHTML = "";
  sortedItems().forEach(([id,it])=>{
    const el = document.createElement("div");
    el.className = "item-box";

    const isSel = it.type === "select";
    let optsHTML = "";
    if (isSel){
      const chips = (it.options||[]).map((o,idx)=>
        `<span class="opt-chip">${o}<span class="del" data-del-opt="${id}" data-oi="${idx}">✕</span></span>`
      ).join("");
      optsHTML = `<div class="opts">${chips}
        <button class="add-opt" data-add-opt="${id}">＋ 선택지</button></div>`;
    } else {
      optsHTML = `<div class="hint">🚗 입력형: 선택지 없이 각자 식수 체크에서 직접 적습니다. (예: 12가 3456)</div>`;
    }

    el.innerHTML = `
      <div class="item-row">
        <input class="item-name" value="${it.name}" data-rename="${id}">
        <button class="x-btn" data-del-item="${id}">✕</button>
      </div>
      <div class="type-row">
        <button class="type-btn ${isSel?'on':''}" data-type="select" data-id="${id}">선택형 (선택지 고르기)</button>
        <button class="type-btn ${!isSel?'on':''}" data-type="input" data-id="${id}">입력형 (직접 적기)</button>
      </div>
      ${optsHTML}`;
    box.appendChild(el);
  });
}

/* --- 주문 현황 표 --- */
function renderStatus(){
  const items = sortedItems();
  const people = sortedPeople();
  document.getElementById("orderCount").textContent = people.length + "명";

  let head = `<tr><th>#</th><th>이름</th>` +
    items.map(([id,it])=>`<th>${it.name}</th>`).join("") + `</tr>`;

  let rows = people.map(([pid,p],i)=>{
    const cells = items.map(([id])=>{
      const v = p.res && p.res[id];
      return v ? `<td class="cell-val">${v}</td>` : `<td class="cell-empty">—</td>`;
    }).join("");
    return `<tr><td class="idx">${i+1}</td><td class="nm">${p.name}</td>${cells}</tr>`;
  }).join("");

  if (!people.length) rows = `<tr><td colspan="${items.length+2}" class="empty">아직 인원이 없어요</td></tr>`;
  document.getElementById("statusTable").innerHTML =
    `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
}

/* --- 식수 체크: 사람 고르기 --- */
function renderPersonPick(){
  const box = document.getElementById("personPick");
  box.innerHTML = "";
  sortedPeople().forEach(([pid,p])=>{
    const b = document.createElement("button");
    b.className = "who" + (currentPerson===pid?" on":"");
    b.textContent = p.name;
    b.onclick = ()=>{ currentPerson = pid; renderPersonPick(); renderForm(); };
    box.appendChild(b);
  });
}

/* --- 식수 체크: 작성 폼 --- */
function renderForm(){
  const p = state.people[currentPerson];
  if (!p){ document.getElementById("formCard").style.display="none"; return; }
  document.getElementById("formCard").style.display = "block";
  document.getElementById("formWho").textContent = p.name + " 님 작성";

  const wrap = document.getElementById("formFields");
  wrap.innerHTML = "";
  sortedItems().forEach(([id,it])=>{
    const field = document.createElement("div");
    field.className = "field";
    const cur = (p.res && p.res[id]) || "";

    if (it.type === "select"){
      const choices = (it.options||[]).map(o=>
        `<button class="choice ${cur===o?'on':''}" data-pick="${id}" data-val="${o}">${o}</button>`
      ).join("");
      const clear = `<button class="choice clear ${cur===''?'':''}" data-pick="${id}" data-val="">없음</button>`;
      field.innerHTML = `<div class="field-label">${it.name}<span class="tag sel">선택형</span></div>
        <div class="choice-row">${choices}${clear}</div>`;
    } else {
      field.innerHTML = `<div class="field-label">${it.name}<span class="tag inp">직접입력</span></div>
        <input class="text-in" data-input="${id}" value="${cur}" placeholder="여기에 입력 (예: 12가 3456)">`;
    }
    wrap.appendChild(field);
  });
}

/* =========================================================
   4) 이벤트
   ========================================================= */
// 탭 전환
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const tab = t.dataset.tab;
    document.getElementById("panel-order").style.display = tab==="order"?"block":"none";
    document.getElementById("panel-check").style.display = tab==="check"?"block":"none";
    document.getElementById("panel-host").style.display  = tab==="host"?"block":"none";
    document.getElementById("monthTitle").textContent =
      state.month + (tab==="check" ? " 식수 체크" : " 주문표");
  };
});

// 항목 추가
document.getElementById("addItemBtn").onclick = ()=>{
  const inp = document.getElementById("newItemInput");
  const name = inp.value.trim();
  if (!name) return;
  const id = uid("i");
  state.items[id] = { name, type:"select", options:[], order:Object.keys(state.items).length };
  inp.value=""; save(); render();
};

// 항목 영역 클릭 위임
document.getElementById("itemList").addEventListener("click", e=>{
  const t = e.target;
  if (t.dataset.delItem){ delete state.items[t.dataset.delItem]; save(); render(); }
  if (t.dataset.type){
    state.items[t.dataset.id].type = t.dataset.type;
    save(); render();
  }
  if (t.dataset.addOpt){
    const o = prompt("선택지 이름 (예: A세트)");
    if (o && o.trim()){ state.items[t.dataset.addOpt].options.push(o.trim()); save(); render(); }
  }
  if (t.dataset.delOpt){
    state.items[t.dataset.delOpt].options.splice(+t.dataset.oi,1); save(); render();
  }
});
// 항목 이름 수정
document.getElementById("itemList").addEventListener("change", e=>{
  if (e.target.dataset.rename){
    state.items[e.target.dataset.rename].name = e.target.value.trim() || "항목";
    save(); render();
  }
});

// 사람 추가
document.getElementById("addPersonBtn").onclick = ()=>{
  const inp = document.getElementById("newPersonInput");
  const name = inp.value.trim();
  if (!name) return;
  const id = uid("p");
  state.people[id] = { name, res:{} };
  inp.value=""; save(); render();
};

// 폼: 선택 / 입력
document.getElementById("formFields").addEventListener("click", e=>{
  const t = e.target;
  if (t.dataset.pick !== undefined){
    const p = state.people[currentPerson];
    if(!p.res) p.res={};
    p.res[t.dataset.pick] = t.dataset.val;
    save(); renderForm();
  }
});
document.getElementById("saveBtn").onclick = ()=>{
  const p = state.people[currentPerson];
  if(!p.res) p.res={};
  document.querySelectorAll("[data-input]").forEach(inp=>{
    p.res[inp.dataset.input] = inp.value.trim();
  });
  save(); renderStatus();
  const b = document.getElementById("saveBtn");
  b.textContent = "✓ 저장됨!";
  setTimeout(()=>b.textContent="저장하기", 1200);
};

// 월 변경
document.getElementById("setMonthBtn").onclick = ()=>{
  const v = document.getElementById("monthInput").value.trim();
  if(v){ state.month=v; save(); render(); }
};
// 응답 초기화
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("모든 사람의 응답을 비울까요? (항목은 유지)")){
    Object.values(state.people).forEach(p=>p.res={});
    save(); render();
  }
};

/* 시작 */
load(render);
</script>
</body>
</html>
